  python_amd64:
    platform: linux/amd64
    container_name: python_amd64
    build:
      context: .
      dockerfile: python.dockerfile
    volumes:
      - ./:/var/www/python
    healthcheck:
      start_period: 10s
      test: ["CMD", "curl", "-f", "http://localhost:4433"]
      interval: 10s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1024M
    restart: unless-stopped
    networks:
      - arnelify-network
    ports:
      - "4433:4433"
    tty: true